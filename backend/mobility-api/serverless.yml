service: smart-mobility-mobility-api

frameworkVersion: '4'

custom:
  pythonRequirements:
    dockerizePip: false
    pythonBin: python3

provider:
  name: aws
  runtime: python3.11
  timeout: 30
  region: eu-north-1
  stage: dev
  logRetentionInDays: 7

  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PATCH
        - OPTIONS
      allowCredentials: false

  environment:
    MOBILITY_EVENTS_TABLE: ${self:service}-${sls:stage}-mobility-events
    USER_ID_TIMESTAMP_INDEX: UserIdTimestampIndex
    ZONE_ID_TIMESTAMP_INDEX: ZoneIdTimestampIndex
    VEHICLE_ID_TIMESTAMP_INDEX: VehicleIdTimestampIndex

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - Fn::GetAtt: [MobilityEventsTable, Arn]
            - Fn::Sub: ${MobilityEventsTable.Arn}/index/*

functions:
  authCheck:
    handler: src/handlers/auth_check.handler

  createMobilityEvent:
    handler: src/handlers/create_mobility_event.handler

  getMobilityEvent:
    handler: src/handlers/get_mobility_event.handler

  listMobilityEvents:
    handler: src/handlers/list_mobility_events.handler

resources:
  Resources:
    
    MobilityEventsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.MOBILITY_EVENTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: eventId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
          - AttributeName: zoneId
            AttributeType: S
          - AttributeName: vehicleId
            AttributeType: S
          - AttributeName: timestamp
            AttributeType: S
        KeySchema:
          - AttributeName: eventId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: UserIdTimestampIndex
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: timestamp
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

          - IndexName: ZoneIdTimestampIndex
            KeySchema:
              - AttributeName: zoneId
                KeyType: HASH
              - AttributeName: timestamp
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

          - IndexName: VehicleIdTimestampIndex
            KeySchema:
              - AttributeName: vehicleId
                KeyType: HASH
              - AttributeName: timestamp
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    ApiMobility:
      Type: AWS::ApiGatewayV2::Api
      Properties:
        Name: api-mobility-${sls:stage}
        ProtocolType: HTTP
        CorsConfiguration:
          AllowOrigins:
            - "*"
          AllowMethods:
            - GET
            - POST
            - PATCH
            - OPTIONS
          AllowHeaders:
            - Content-Type
            - Authorization

    ApiMobilityStage:
      Type: AWS::ApiGatewayV2::Stage
      Properties:
        ApiId:
          Ref: ApiMobility
        StageName: $default
        AutoDeploy: true

    ApiMobilityAuthorizer:
      Type: AWS::ApiGatewayV2::Authorizer
      Properties:
        ApiId:
          Ref: ApiMobility
        AuthorizerType: JWT
        IdentitySource:
          - $request.header.Authorization
        Name: cognito-jwt-mobility
        JwtConfiguration:
          Issuer:
            Fn::Sub:
              - https://cognito-idp.${AWS::Region}.amazonaws.com/${ImportedUserPoolId}
              - ImportedUserPoolId:
                  Fn::ImportValue: smart-mobility-${sls:stage}-cognito-user-pool-id
          Audience:
            - Fn::ImportValue: smart-mobility-${sls:stage}-cognito-user-pool-client-id

    AuthCheckIntegration:
      Type: AWS::ApiGatewayV2::Integration
      Properties:
        ApiId:
          Ref: ApiMobility
        IntegrationType: AWS_PROXY
        IntegrationUri:
          Fn::GetAtt: [AuthCheckLambdaFunction, Arn]
        PayloadFormatVersion: "2.0"

    CreateMobilityEventIntegration:
      Type: AWS::ApiGatewayV2::Integration
      Properties:
        ApiId:
          Ref: ApiMobility
        IntegrationType: AWS_PROXY
        IntegrationUri:
          Fn::GetAtt: [CreateMobilityEventLambdaFunction, Arn]
        PayloadFormatVersion: "2.0"

    AuthCheckRoute:
      Type: AWS::ApiGatewayV2::Route
      Properties:
        ApiId:
          Ref: ApiMobility
        RouteKey: GET /auth-check
        Target:
          Fn::Join:
            - /
            - - integrations
              - Ref: AuthCheckIntegration
        AuthorizationType: JWT
        AuthorizerId:
          Ref: ApiMobilityAuthorizer

    CreateMobilityEventRoute:
      Type: AWS::ApiGatewayV2::Route
      Properties:
        ApiId:
          Ref: ApiMobility
        RouteKey: POST /mobility/events
        Target:
          Fn::Join:
            - /
            - - integrations
              - Ref: CreateMobilityEventIntegration
        AuthorizationType: JWT
        AuthorizerId:
          Ref: ApiMobilityAuthorizer

    AuthCheckLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName:
          Ref: AuthCheckLambdaFunction
        Principal: apigateway.amazonaws.com
        SourceArn:
          Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiMobility}/*/*

    CreateMobilityEventLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName:
          Ref: CreateMobilityEventLambdaFunction
        Principal: apigateway.amazonaws.com
        SourceArn:
          Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiMobility}/*/*

    GetMobilityEventIntegration:
      Type: AWS::ApiGatewayV2::Integration
      Properties:
        ApiId:
          Ref: ApiMobility
        IntegrationType: AWS_PROXY
        IntegrationUri:
          Fn::GetAtt: [GetMobilityEventLambdaFunction, Arn]
        PayloadFormatVersion: "2.0"

    ListMobilityEventsIntegration:
      Type: AWS::ApiGatewayV2::Integration
      Properties:
        ApiId:
          Ref: ApiMobility
        IntegrationType: AWS_PROXY
        IntegrationUri:
          Fn::GetAtt: [ListMobilityEventsLambdaFunction, Arn]
        PayloadFormatVersion: "2.0"
    
    GetMobilityEventRoute:
      Type: AWS::ApiGatewayV2::Route
      Properties:
        ApiId:
          Ref: ApiMobility
        RouteKey: GET /mobility/events/{eventId}
        Target:
          Fn::Join:
            - /
            - - integrations
              - Ref: GetMobilityEventIntegration
        AuthorizationType: JWT
        AuthorizerId:
          Ref: ApiMobilityAuthorizer

    ListMobilityEventsRoute:
      Type: AWS::ApiGatewayV2::Route
      Properties:
        ApiId:
          Ref: ApiMobility
        RouteKey: GET /mobility/events
        Target:
          Fn::Join:
            - /
            - - integrations
              - Ref: ListMobilityEventsIntegration
        AuthorizationType: JWT
        AuthorizerId:
          Ref: ApiMobilityAuthorizer

    GetMobilityEventLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName:
          Ref: GetMobilityEventLambdaFunction
        Principal: apigateway.amazonaws.com
        SourceArn:
          Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiMobility}/*/*

    ListMobilityEventsLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName:
          Ref: ListMobilityEventsLambdaFunction
        Principal: apigateway.amazonaws.com
        SourceArn:
          Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiMobility}/*/*

  Outputs:
    ApiMobilityId:
      Value:
        Ref: ApiMobility
      Export:
        Name: smart-mobility-${sls:stage}-api-mobility-id

    ApiMobilityUrl:
      Value:
        Fn::Sub: https://${ApiMobility}.execute-api.${AWS::Region}.amazonaws.com
      Export:
        Name: smart-mobility-${sls:stage}-api-mobility-url

    MobilityEventsTableName:
      Value:
        Ref: MobilityEventsTable
      Export:
        Name: smart-mobility-${sls:stage}-mobility-events-table-name
    
    MobilityEventsTableArn:
      Value:
        Fn::GetAtt: [MobilityEventsTable, Arn]
      Export:
        Name: smart-mobility-${sls:stage}-mobility-events-table-arn
