service: smart-mobility-simulator

frameworkVersion: '4'

provider:
  name: aws
  region: eu-north-1
  stage: dev
  ecr:
    images:
      simulatorimage:
        path: . 

  environment:
    API_MOBILITY_URL:
      Fn::Join:
        - ""
        - - Fn::ImportValue: smart-mobility-${sls:stage}-api-mobility-url
          - /mobility/events
    EVENTS_PER_RUN: ${env:EVENTS_PER_RUN, '10'}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID, "6ein230m72do06c2ruijane4uv"}
    COGNITO_USERNAME: ${env:COGNITO_USERNAME, "simulator@urbanmove.local"}
    COGNITO_PASSWORD: ${env:COGNITO_PASSWORD, "Simulator1@"}

functions:
  mobilityEventGenerator:
    image:
      name: simulatorimage
    name: ${self:service}-${sls:stage}-generator
    description: Generates simulated mobility events and posts them to the mobility API
    timeout: 30
    memorySize: 256
    events:
      - schedule:
          rate: rate(1 minute)
          enabled: true

