service: smart-mobility-api

frameworkVersion: '4'

provider:
  name: aws
  runtime: python3.11
  region: eu-north-1
  stage: dev
  logRetentionInDays: 7

  environment:
    MOBILITY_EVENTS_TABLE: ${self:service}-${sls:stage}-mobility-events
    SUMMARY_TABLE: ${self:service}-${sls:stage}-summary
    AGGREGATE_FUNCTION_NAME: ${self:service}-${sls:stage}-aggregateMobilityEvent

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt MobilityEventsTable.Arn
            - !GetAtt SummaryTable.Arn

        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - !GetAtt AggregateMobilityEventLambdaFunction.Arn

functions:
  createMobilityEvent:
    handler: src/handlers/create_mobility_event.handler
    events:
      - httpApi:
          path: /mobility/events
          method: post

  aggregateMobilityEvent:
    handler: src/handlers/aggregate_mobility_event.handler

  getSummary:
    handler: src/handlers/get_summary.handler
    events:
      - httpApi:
          path: /summary
          method: get

resources:
  Resources:
    MobilityEventsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.MOBILITY_EVENTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: eventId
            AttributeType: S
        KeySchema:
          - AttributeName: eventId
            KeyType: HASH

    SummaryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SUMMARY_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: summaryKey
            AttributeType: S
        KeySchema:
          - AttributeName: summaryKey
            KeyType: HASH